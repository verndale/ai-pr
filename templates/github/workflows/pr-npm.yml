# Requires package-lock.json in the repo (commit lockfile). Use pnpm init if you use pnpm instead.
name: Create or update PR

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: "Target base branch"
        required: true
        default: "main"
      draft:
        description: "Create PR as draft"
        required: true
        default: "true"
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

# Run checkout/setup-node/cache actions on Node 24 (GitHub Actions JS runtime).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.PR_BOT_TOKEN }}
          PR_BASE_BRANCH: ${{ github.event.inputs.base_branch || 'main' }}
          PR_HEAD_BRANCH: ${{ github.ref_name }}
          PR_DRAFT: ${{ github.event.inputs.draft || 'true' }}
          PR_AI: ${{ vars.PR_AI }}
          PR_AI_ENDPOINT: ${{ vars.PR_AI_ENDPOINT }}
          PR_AI_MODEL: ${{ vars.PR_AI_MODEL }}
          PR_AI_API_KEY: ${{ secrets.PR_AI_API_KEY }}
        run: npm run pr:create
